version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ai-interview-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_interview

  backend:
    build: ./backend
    container_name: ai-interview-backend
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ai_interview
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: dev-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
    depends_on:
      - mongodb
      - ai-service

  ai-service:
    build: ./ai-service
    container_name: ai-interview-ai
    ports:
      - '8000:8000'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  frontend:
    build: ./frontend
    container_name: ai-interview-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  mongodb_data:
